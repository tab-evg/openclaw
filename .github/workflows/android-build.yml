name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Android
        run: pnpm android:assemble

      - name: Debug - list output files
        run: find apps/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/android/app/build/outputs/apk/debug/
          gh release upload android-debug app-debug.apk --repo tab-evg/openclaw --clobber || echo "Upload failed, trying artifact only"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 5
