name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Android
        run: pnpm android:assemble

      - name: Debug - list output files
        run: find apps/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Debug - check build dir
        run: ls -la apps/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
